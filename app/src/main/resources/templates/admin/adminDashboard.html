<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logo.png}" />

    <title>Admin Dashboard | Medical Portal</title>

    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}">

    <script th:src="@{/js/util.js}" defer></script>
    <script th:src="@{/js/render.js}" defer></script>
    <script th:src="@{/js/components/header.js}" defer></script>
    <script th:src="@{/js/components/footer.js}" defer></script>
</head>

<body onload="renderContent()">

<div class="container">

    <div class="wrapper">

        <div id="header"></div>

        <main class="main-content">

            <section class="controls-wrapper">
                <div class="search-container">
                    <input type="text" id="searchBar" placeholder="Search doctors by name or ID...">
                </div>

                <div class="filters-container">
                    <select id="filter-time">
                        <option value="">Filter by Shift</option>
                        <option value="AM">Morning (AM)</option>
                        <option value="PM">Afternoon (PM)</option>
                    </select>

                    <select id="filter-specialty">
                        <option value="">All Specialties</option>
                        <option value="Cardiologist">Cardiologist</option>
                        <option value="Dentist">Dentist</option>
                        <option value="Pediatrician">Pediatrician</option>
                        <option value="Neurologist">Neurologist</option>
                    </select>
                </div>
            </section>

            <div id="content" class="doctor-grid">
            </div>

        </main>

        <div id="footer"></div>

    </div> </div> <div id="admin-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal-content">
        <span class="close-button" id="close-modal">&times;</span>
        <div id="modal-body">
        </div>
    </div>
</div>

<script type="module" th:src="@{/js/adminDashboard.js}" defer></script>
<script type="module" th:src="@{/js/doctorCard.js}" defer></script>

</body>
</html>
